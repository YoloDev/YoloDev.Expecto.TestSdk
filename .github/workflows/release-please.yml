name: release-please

on:
  push:
    branches: [main]

jobs:
  release_please:
    name: Release Please
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: write
      statuses: write

    steps:
      - id: release
        uses: GoogleCloudPlatform/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: transform
        name: Massage output
        env:
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          UPLOAD_URL: ${{ steps.release.outputs.upload_url }}
        run: |
          ANY=$(echo $PATHS_RELEASED | jq '. | length | . > 0')
          echo "ANY: $ANY"
          echo "TAG_NAME: '$TAG_NAME'"
          echo "UPLOAD_URL: '$UPLOAD_URL'"
          echo "any=$ANY" >> $GITHUB_OUTPUT

      - name: Print outputs
        env:
          ANY: ${{ steps.transform.outputs.any }}
        run: |
          echo "any: '$ANY'"

    outputs:
      any_released: ${{ steps.transform.outputs.any }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}

  build:
    name: Build
    runs-on: ubuntu-latest
    if: fromJSON(needs.release_please.outputs.any_released)
    needs:
      - release_please

    permissions:
      contents: write

    concurrency:
      group: release

    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: ⏬ Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: 🔽 Setup dotnet from global.json
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8

      - name: 🔽 Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: 🔍 Print dotnet info
        run: dotnet --info

      - name: 🧪 Test
        run: just test

      - name: 🧹 Clean
        run: just clean

      - name: 📦 Pack
        run: just pack

      - name: 🔼 Upload packages as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget
          path: artifacts/nuget/

      - name: 🔼 Upload global.json as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: global-json
          path: global.json

      - name: 🔼 Upload packages as github release asset
        if: needs.release_please.outputs.upload_url != ''
        uses: shogo82148/actions-upload-release-asset@96bc1f0cb850b65efd58a6b5eaa0a69f88d38077 # v1
        with:
          upload_url: ${{ needs.release_please.outputs.upload_url }}
          asset_path: artifacts/nuget/*

  githubpkg:
    name: Push to GitHub Packages
    runs-on: ubuntu-latest
    if: fromJSON(needs.release_please.outputs.any_released)
    environment: release

    needs:
      - release_please
      - build

    permissions:
      packages: write

    steps:
      - name: 🔽 Download nuget artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: nuget
          path: nuget

      - name: 🔽 Download global-json artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: global-json

      - name: 🔽 Install dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8

      - name: 🔼 Publish package to nuget
        run: dotnet nuget push --force-english-output --api-key '${{ secrets.GITHUB_TOKEN }}' --source 'https://nuget.pkg.github.com/YoloDev/index.json' --skip-duplicate "nuget/*.nupkg"

  nuget:
    name: Push to Nuget
    runs-on: ubuntu-latest
    if: fromJSON(needs.release_please.outputs.any_released)
    environment: nuget

    needs:
      - release_please
      - build
      - githubpkg
    
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job

    steps:
      - name: 🔽 Download nuget artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: nuget
          path: nuget

      - name: 🔽 Download global-json artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: global-json

      - name: 🔽 Install dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8
      
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
        id: login
        with:
          user: alxandr

      - name: 🔼 Publish package to nuget
        run: dotnet nuget push --force-english-output --api-key '${{steps.login.outputs.NUGET_API_KEY}}' --source '${{ secrets.NUGET_FEED }}' --skip-duplicate "nuget/*.nupkg"
